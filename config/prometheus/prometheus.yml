global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-proxy'
    static_configs:
      - targets: ['192.168.200.2:9100']
        labels: { instance: 'VM-Proxy' }

  - job_name: 'node-proxy2'
    static_configs:
      - targets: ['192.168.200.8:9100']
        labels: { instance: 'VM-Proxy2' }

  - job_name: 'node-app1'
    static_configs:
      - targets: ['192.168.200.3:9100']
        labels: { instance: 'VM-App1' }

  - job_name: 'node-app2'
    static_configs:
      - targets: ['192.168.200.4:9100']
        labels: { instance: 'VM-App2' }

  - job_name: 'node-db'
    static_configs:
      - targets: ['192.168.200.5:9100']
        labels: { instance: 'VM-DB' }

  - job_name: 'node-db2'
    static_configs:
      - targets: ['192.168.200.10:9100']
        labels: { instance: 'VM-DB2' }

  - job_name: 'node-dns'
    static_configs:
      - targets: ['192.168.200.9:9100']
        labels: { instance: 'VM-DNS' }

  - job_name: 'nginx'
    static_configs:
      - targets: ['localhost:9113']
        labels: { instance: 'NGINX-Proxy' }
