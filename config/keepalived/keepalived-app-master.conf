vrrp_script check_chat {
    script "/etc/keepalived/check_chat.sh"
    interval 2
    weight   -30
    fall     2
    rise     2
}

vrrp_instance VI_CHAT {
    state  MASTER
    interface enp0s3
    virtual_router_id 51
    priority 110
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass ChatHA2024
    }
    virtual_ipaddress {
        192.168.200.6/24
    }
    track_script { check_chat }
}
