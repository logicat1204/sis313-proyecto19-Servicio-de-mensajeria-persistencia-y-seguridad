<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat Empresarial — SIS313</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }
  header { background: #16213e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f3460; }
  header h1 { font-size: 1.2em; color: #e94560; }
  #node-badge { background: #0f3460; color: #a8dadc; padding: 4px 10px; border-radius: 12px; font-size: 0.8em; }
  #user-info  { display: flex; align-items: center; gap: 10px; }
  #logout-btn { background: #e94560; color: white; border: none; border-radius: 8px; padding: 4px 12px; cursor: pointer; font-size: 0.85em; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { background: #16213e; padding: 10px 14px; border-radius: 10px; max-width: 80%; }
  .msg.own { align-self: flex-end; background: #0f3460; }
  .msg.system { align-self: center; background: #1a1a2e; border: 1px solid #333; font-style: italic; color: #888; font-size: 0.85em; }
  .msg .meta { font-size: 0.75em; color: #888; margin-bottom: 4px; }
  .msg .meta .node-tag { color: #e94560; font-weight: bold; }
  footer { background: #16213e; padding: 12px 16px; display: flex; gap: 10px; border-top: 2px solid #0f3460; }
  footer input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; }
  footer button { padding: 10px 20px; border-radius: 8px; border: none; background: #e94560; color: white; cursor: pointer; font-weight: bold; }

  /* ── Overlay de autenticación ── */
  #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .auth-box { background: #16213e; padding: 32px; border-radius: 16px; text-align: center; min-width: 320px; border: 1px solid #0f3460; }
  .auth-box h2 { margin-bottom: 8px; color: #e94560; }
  .auth-box p  { color: #888; font-size: 0.9em; margin-bottom: 20px; }
  .auth-box input { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; }
  .auth-box .btn-primary { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; margin-top: 8px; }
  .auth-box .btn-secondary { width: 100%; padding: 10px; background: transparent; color: #a8dadc; border: 1px solid #0f3460; border-radius: 8px; cursor: pointer; margin-top: 6px; }
  .auth-error { color: #ff6b6b; font-size: 0.85em; margin-top: 8px; min-height: 20px; }
  .tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #0f3460; }
  .tab { flex: 1; padding: 8px; background: #1a1a2e; color: #888; border: none; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: #e94560; color: white; }

  /* ── Room input ── */
  #room-bar { background: #16213e; padding: 8px 16px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #0f3460; }
  #room-bar input { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 0.9em; }
  #room-bar button { padding: 6px 14px; border-radius: 6px; border: none; background: #0f3460; color: #a8dadc; cursor: pointer; font-size: 0.85em; }
</style>
</head>
<body>

<!-- ── Overlay de autenticación ── -->
<div id="auth-overlay">
  <div class="auth-box">
    <h2>💬 Chat SIS313</h2>
    <p>Plataforma de Mensajería Empresarial</p>
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Iniciar Sesión</button>
      <button class="tab" onclick="showTab('register')">Registrarse</button>
    </div>

    <!-- Login -->
    <div id="tab-login">
      <input id="login-user" placeholder="Usuario" autocomplete="username">
      <input id="login-pass" placeholder="Contraseña" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
    </div>

    <!-- Registro -->
    <div id="tab-register" style="display:none">
      <input id="reg-user"  placeholder="Nombre de usuario">
      <input id="reg-email" placeholder="Correo electrónico (opcional)" type="email">
      <input id="reg-pass"  placeholder="Contraseña (mín. 6 caracteres)" type="password">
      <input id="reg-pass2" placeholder="Repetir contraseña" type="password">
      <button class="btn-primary" onclick="doRegister()">Crear cuenta</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── Interfaz del chat ── -->
<header>
  <h1>💬 Chat Empresarial — SIS313</h1>
  <div id="user-info">
    <span id="node-badge">Conectando...</span>
    <span id="username-display" style="font-size:0.85em; color:#a8dadc;"></span>
    <button id="logout-btn" onclick="doLogout()">Salir</button>
  </div>
</header>
<div id="room-bar">
  <span style="color:#888; font-size:0.85em;">Sala:</span>
  <input id="room-input" value="general" placeholder="nombre de sala">
  <button onclick="changeRoom()">Unirse</button>
</div>
<div id="messages"></div>
<footer>
  <input id="msg-input" placeholder="Escribe un mensaje..." maxlength="500" onkeydown="if(event.key==='Enter') sendMsg()">
  <button onclick="sendMsg()">Enviar</button>
</footer>

<script>
let token = '', username = '', room = 'general', socket;

// ── Persistencia de sesión ──
window.onload = () => {
  const saved = localStorage.getItem('chat_token');
  const savedUser = localStorage.getItem('chat_username');
  if (saved && savedUser) {
    token = saved; username = savedUser;
    verifyAndConnect();
  }
};

async function verifyAndConnect() {
  try {
    const res = await fetch('/api/auth/verify', { headers: { Authorization: 'Bearer ' + token } });
    if (res.ok) {
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('username-display').textContent = username;
      connectSocket();
      loadHistory();
    } else { clearSession(); }
  } catch { clearSession(); }
}

function showTab(tab) {
  document.getElementById('tab-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) return setError('Completa todos los campos');
  try {
    const res  = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: u, password: p }) });
    const data = await res.json();
    if (!res.ok) return setError(data.error || 'Error al iniciar sesión');
    token = data.token; username = data.username;
    localStorage.setItem('chat_token', token);
    localStorage.setItem('chat_username', username);
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('username-display').textContent = username;
    connectSocket();
    loadHistory();
  } catch { setError('Error de red'); }
}

async function doRegister() {
  const u  = document.getElementById('reg-user').value.trim();
  const e  = document.getElementById('reg-email').value.trim();
  const p  = document.getElementById('reg-pass').value;
  const p2 = document.getElementById('reg-pass2').value;
  if (!u || !p) return setError('Completa los campos requeridos');
  if (p !== p2) return setError('Las contraseñas no coinciden');
  try {
    const res  = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: u, password: p, email: e }) });
    const data = await res.json();
    if (!res.ok) return setError(data.error || 'Error al registrarse');
    setError('✅ Cuenta creada. Ahora inicia sesión.');
    showTab('login');
    document.getElementById('login-user').value = u;
  } catch { setError('Error de red'); }
}

function doLogout() {
  clearSession();
  if (socket) socket.disconnect();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('auth-overlay').style.display = 'flex';
}

function clearSession() {
  token = ''; username = '';
  localStorage.removeItem('chat_token');
  localStorage.removeItem('chat_username');
}

function setError(msg) { document.getElementById('auth-error').textContent = msg; }

function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'], auth: { token } });
  socket.on('connect', () => {
    document.getElementById('node-badge').textContent = 'Conectado';
    socket.emit('join_room', room);
  });
  socket.on('system_message', (data) => {
    addMessage({ username: 'Sistema', content: data.content, isSystem: true });
    const match = data.content.match(/nodo: (\w+)/);
    if (match) document.getElementById('node-badge').textContent = '🟢 ' + match[1];
  });
  socket.on('receive_message', (msg) => addMessage(msg));
  socket.on('disconnect', () => { document.getElementById('node-badge').textContent = '🔴 Desconectado'; });
  socket.on('connect_error', (err) => {
    if (err.message === 'Token inválido') { clearSession(); doLogout(); }
  });
}

async function loadHistory() {
  const res  = await fetch(`/api/messages?room=${room}&limit=30`, { headers: { Authorization: 'Bearer ' + token } });
  if (!res.ok) return;
  const data = await res.json();
  data.messages.forEach(m => addMessage(m, true));
  document.getElementById('node-badge').textContent = '🟢 ' + data.node;
}

function changeRoom() {
  const newRoom = document.getElementById('room-input').value.trim() || 'general';
  if (newRoom === room) return;
  room = newRoom;
  document.getElementById('messages').innerHTML = '';
  if (socket?.connected) {
    socket.emit('join_room', room);
    loadHistory();
  }
}

function addMessage(msg) {
  const div = document.createElement('div');
  div.classList.add('msg');
  if (msg.isSystem) div.classList.add('system');
  else if (msg.username === username) div.classList.add('own');
  const time    = msg.created_at ? new Date(msg.created_at).toLocaleTimeString() : new Date().toLocaleTimeString();
  const nodeTag = msg.node ? `<span class="node-tag">[${msg.node}]</span>` : '';
  div.innerHTML = msg.isSystem
    ? `<span>${msg.content}</span>`
    : `<div class="meta">${msg.username} ${nodeTag} · ${time}</div><div>${msg.content}</div>`;
  const container = document.getElementById('messages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !socket?.connected) return;
  socket.emit('send_message', { content, room });
  input.value = '';
}
</script>
</body>
</html>
